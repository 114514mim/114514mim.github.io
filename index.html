<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PHANTOM V9 ULTRA | VIRTUALIZATION KERNEL</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff96;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #terminal {
            width: 800px;
            background: #0a0a0c;
            border: 2px solid #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            padding: 20px;
            position: relative;
            animation: borderGlow 2s infinite alternate;
        }
        @keyframes borderGlow {
            from { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            to { border-color: #00ff96; box-shadow: 0 0 20px #00ff96; }
        }
        h2 { text-align: center; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        textarea {
            width: 100%;
            height: 300px;
            background: #000;
            color: #64c8ff;
            border: 1px solid #333;
            resize: none;
            font-size: 12px;
            outline: none;
            padding: 10px;
            box-sizing: border-box;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }
        button {
            background: #1a1a1f;
            color: #00ff96;
            border: 1px solid #00ff96;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New';
            transition: 0.3s;
        }
        button:hover {
            background: #00ff96;
            color: #000;
            box-shadow: 0 0 15px #00ff96;
        }
        #status { font-size: 12px; margin-top: 10px; color: #ff5555; }
    </style>
</head>
<body>

<div id="terminal">
    <h2>>>> PHANTOM_V9_ULTRA_VIRTUALIZER <<<</h2>
    <textarea id="input" placeholder="-- 在此粘贴你的 Lua 源代码..."></textarea>
    <div id="status">KERNEL_STATUS: READY</div>
    <div class="btn-container">
        <button onclick="obfuscate()">执行高强度混淆</button>
        <button onclick="clearAll()">清空</button>
    </div>
</div>

<script>
    function generateRandomName(len) {
        const chars = ["Il1", "l1I", "O0O", "0O0", "I1I", "ll11", "IIll"];
        let res = "_";
        for(let i=0; i<len; i++) res += chars[Math.floor(Math.random() * chars.length)];
        return res;
    }

    function obfuscate() {
        const input = document.getElementById('input').value;
        const status = document.getElementById('status');
        
        if (input.length < 1) {
            status.innerText = "ERROR: INPUT_EMPTY";
            return;
        }

        status.innerText = "VIRTUALIZING KERNEL... PLEASE WAIT...";

        setTimeout(() => {
            const key = Math.floor(Math.random() * 200) + 50;
            const seed = Math.floor(Math.random() * 99999);
            
            // 转换为字节码并应用位移异或
            let encodedData = [];
            for (let i = 0; i < input.length; i++) {
                let b = input.charCodeAt(i);
                // 模拟位左移和异或
                let val = (b ^ key);
                encodedData.push(val);
            }

            // 生成超长垃圾代码池
            let junkLines = "";
            for(let i=0; i<400; i++) {
                junkLines += `local ${generateRandomName(5)} = math.sqrt(${Math.random()}) * math.tan(${Math.random()});\n`;
            }

            const vmName = generateRandomName(6);
            const dataName = generateRandomName(6);
            const keyName = generateRandomName(6);

            // 构建最终的混淆脚本
            const template = `--[[ PHANTOM_PROTECTED_V9 ]]
${junkLines}
local ${dataName} = {${encodedData.join(",")}}
local ${keyName} = ${key}
local function ${vmName}(...)
    local _S = ""
    for i=1, #${dataName} do
        local _b = ${dataName}[i]
        -- 核心动态解密层
        _S = _S .. string.char(bit32.bxor(_b, ${keyName}))
    end
    local _p, _err = loadstring(_S)
    if _p then return _p(...) else error(_err) end
end
${junkLines}
task.spawn(${vmName})
`;

            document.getElementById('input').value = template;
            status.innerText = "KERNEL_STATUS: ENCRYPTION_SUCCESS (手动全选复制即可)";
        }, 500);
    }

    function clearAll() {
        document.getElementById('input').value = "";
        document.getElementById('status').innerText = "KERNEL_STATUS: READY";
    }
</script>

</body>
</html>
