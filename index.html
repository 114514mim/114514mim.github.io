<script>
const ASCII_HEADER = `--[[
         __________          __________          __________
     /         /|        /         /|        /         /|
    /   ______/ |       /   ______/ |       /   ______/ |
   /   /|______|/      /   /|______|/      /   /|______|/
  /   /_/______       /   /_/______       /   /_/______ 
 /            /|     /            /|     /            /|
/____________/ /    /____________/ /    /____________/ /
|____________|/     |____________|/     |____________|/

              << Obfuscated by https://114514mim.github.io >>
]]\n\n`;

function obfuscate() {
    const input = document.getElementById('inputCode').value;
    if (!input.trim()) return;

    // 1. 将整个脚本转换为十进制转义字符 (\104\116\116...)
    let encoded = "";
    for (let i = 0; i < input.length; i++) {
        encoded += "\\" + input.charCodeAt(i);
    }

    // 2. 注入垃圾干扰代码 (Junk Code)
    // 制造一些虚假的局部变量，迷惑反汇编工具
    const junkVariables = [
        `local _0x${Math.random().toString(16).slice(2, 8)} = "${Math.random().toString(36).slice(2, 10)}";`,
        `local _0x${Math.random().toString(16).slice(2, 8)} = (function() return ${Math.floor(Math.random() * 1000)} end)();`,
        `if false then print("${Math.random().toString(36)}") end`
    ].join("\n");

    // 3. 构建多层嵌套执行逻辑
    // 使用 loadstring 执行编码后的内容，并包裹在匿名函数中
    // 同时对 "loadstring" 这个关键词也进行混淆 (通过 getfenv 或反斜杠)
    let finalCode = `${junkVariables}\n`;
    finalCode += `(function(...) \n`;
    finalCode += `    local _0x_runtime = "\\108\\111\\97\\100\\115\\116\\114\\105\\110\\103"; -- "loadstring"\n`;
    finalCode += `    getfenv()[_0x_runtime]("${encoded}")(...);\n`;
    finalCode += `end)();`;

    // 4. 输出结果
    document.getElementById('outputCode').value = ASCII_HEADER + finalCode;
}

function copyOutput() {
    const output = document.getElementById('outputCode');
    output.select();
    document.execCommand('copy');
    alert('混淆脚本已复制！');
}
</script>
