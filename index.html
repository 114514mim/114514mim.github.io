<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Lua 混淆器 - Custom Header Edition</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --text: #e2e8f0; }
        body { font-family: 'Consolas', monospace; padding: 40px; background: var(--bg); color: var(--text); }
        .container { max-width: 900px; margin: 0 auto; }
        textarea { 
            width: 100%; height: 250px; background: #1e293b; color: #38bdf8; 
            border: 1px solid #334155; border-radius: 8px; padding: 15px; 
            font-size: 14px; margin-bottom: 20px; resize: vertical;
        }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { 
            background: var(--primary); color: white; border: none; 
            padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Lua 代码混淆工具</h2>
    <p>输入原始代码：</p>
    <textarea id="inputCode" placeholder="print('Hello World')"></textarea>
    
    <div class="controls">
        <button onclick="obfuscate()">生成混淆代码</button>
        <button style="background: #475569;" onclick="copyOutput()">复制结果</button>
    </div>
    
    <p>混淆后的结果 (包含 ASCII Header)：</p>
    <textarea id="outputCode" readonly></textarea>
</div>

<script>
// 你提供的 ASCII 字符画
const ASCII_HEADER = `--[[
      __________          __________          __________
     /         /|        /         /|        /         /|
    /   ______/ |       /   ______/ |       /   ______/ |
   /   /|______|/      /   /|______|/      /   /|______|/
  /   /_/______       /   /_/______       /   /_/______ 
 /            /|     /            /|     /            /|
/____________/ /    /____________/ /    /____________/ /
|____________|/     |____________|/     |____________|/

              <<v     zhifeijiyut obf    v>>
]]--\n\n`;

function obfuscate() {
    const input = document.getElementById('inputCode').value;
    if (!input) return;

    let result = input;

    // 1. 简单字符串转义 (将 "Text" 变成 \84\101\120\116)
    result = result.replace(/"(.*?)"|'(.*?)'/g, (match, p1, p2) => {
        let str = p1 || p2 || "";
        let escaped = "";
        for (let i = 0; i < str.length; i++) {
            escaped += "\\" + str.charCodeAt(i);
        }
        return `"${escaped}"`;
    });

    // 2. 局部变量混淆 (基础示例：将关键关键词后加随机后缀)
    // 注意：这只是简单演示，复杂的混淆需要词法分析器
    result = result.replace(/\blocal\s+([a-zA-Z_][a-zA-Z0-9_]*)/g, (match, varName) => {
        let randomID = "_0x" + Math.floor(Math.random() * 0xFFFFFF).toString(16);
        return `local ${randomID} --[[${varName}]]`; 
    });

    // 3. 组合最终结果：ASCII Header + 混淆后的内容
    document.getElementById('outputCode').value = ASCII_HEADER + result;
}

function copyOutput() {
    const output = document.getElementById('outputCode');
    output.select();
    document.execCommand('copy');
    alert('代码已复制到剪贴板！');
}
</script>

</body>
</html>
