<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zhiUI Code Porter - 简洁的代码分发工具</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --accent: #007aff;
            --accent-share: #5856d6;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --border: #222222;
            --success: #34c759;
            --error: #ff3b30;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 850px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h2 { margin: 0; color: var(--accent); letter-spacing: -0.5px; }
        p { color: var(--text-dim); font-size: 14px; margin-top: 8px; }

        textarea {
            width: 100%;
            height: 350px;
            background: #000;
            color: #d1d1d1;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus { border-color: var(--accent); }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            display: flex;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 12px;
            min-width: 200px;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 0;
            outline: none;
            width: 100%;
            font-family: inherit;
        }

        .input-group span { color: var(--text-dim); align-self: center; font-size: 14px; }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download { background: var(--accent); color: white; }
        .btn-download:hover { background: #0063d1; transform: translateY(-1px); }

        .btn-share { background: transparent; border: 1px solid var(--accent-share); color: var(--accent-share); }
        .btn-share:hover { background: var(--accent-share); color: white; }

        #status {
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }

        .success { color: var(--success); }
        .error { color: var(--error); }

        /* 动画 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .container { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2>zhiUI Code Porter</h2>
            <p>快速保存脚本、导出代码或创建 Pastefy 分享链接</p>
        </header>

        <textarea id="textContent" placeholder="在此粘贴你的 Luau 脚本或任何文本内容..."></textarea>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="fileName" placeholder="文件名" value="script_file">
                <span>.txt</span>
            </div>
            
            <button class="btn btn-share" onclick="createPaste()">
                <span>🔗</span> 创建链接
            </button>

            <button class="btn btn-download" onclick="saveAsTxt()">
                <span>💾</span> 保存并下载
            </button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const contentEl = document.getElementById('textContent');
        const nameEl = document.getElementById('fileName');

        function setStatus(msg, type = '') {
            statusEl.innerText = msg;
            statusEl.className = type;
            setTimeout(() => { if(type === 'success') statusEl.innerText = ''; }, 3000);
        }

        // 功能 1：下载到本地
        function saveAsTxt() {
            const content = contentEl.value;
            const name = (nameEl.value || "untitled") + ".txt";

            if (!content.trim()) {
                setStatus("❌ 请先输入内容！", "error");
                return;
            }

            try {
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    setStatus("✅ 文件已准备好下载", "success");
                }, 100);
            } catch (err) {
                setStatus("❌ 下载失败，请重试", "error");
            }
        }

        // 功能 2：创建 Pastefy 链接
        function createPaste() {
            const content = contentEl.value;
            const title = nameEl.value || "Untitled Script";

            if (!content.trim()) {
                setStatus("❌ 内容为空，无法创建链接", "error");
                return;
            }

            setStatus("🚀 正在上传至 Pastefy...", "");

            fetch('https://pastefy.app/api/v2/paste', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: title,
                    content: content,
                    type: "PASTE"
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    const shareUrl = `https://pastefy.app/${data.paste.id}`;
                    setStatus("✅ 链接创建成功！正在跳转...", "success");
                    window.open(shareUrl, '_blank');
                } else {
                    throw new Error();
                }
            })
            .catch(() => {
                setStatus("❌ 链接创建失败，请检查网络", "error");
            });
        }
    </script>
</body>
</html>
