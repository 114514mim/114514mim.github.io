<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junkie Developments • Script Loader</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 霓虹红/暗色卡片样式 */
        .container {
            background: #121212;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.1);
            border: 1px solid #1f1f1f;
            text-align: center;
            max-width: 400px;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #ff0000, #800000);
            border-radius: 12px 12px 0 0;
        }

        .status-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.4rem;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .code-box {
            background: #050505;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            color: #ff4d4d;
            margin: 20px 0;
            border: 1px dashed #333;
            word-break: break-all;
        }

        .footer-text {
            font-size: 0.7rem;
            color: #444;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status-icon">🛡️</div>
    <h1>环境保护已启用</h1>
    <p>此页面仅供展示。请在受支持的执行器中使用以下加载代码：</p>
    
    <div class="code-box">
        loadstring(game:HttpGet("https://raw.githubusercontent.com/114514mim/kdjddjosso/refs/heads/main/纸脚本.v1"))()
    </div>

    <p class="footer-text">By zhifeiji yut • Team U.N.</p>
</div>

</body>
</html>
