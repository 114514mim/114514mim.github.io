<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZHI LUA PRO FREE - FIXED</title>
  <style>
    :root { --glow: #00ff88; --bg: #05050a; --error: #ff4444; }
    body { margin: 0; background: var(--bg); color: #fff; font-family: 'Fira Code', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { margin: 25px 0; text-align: center; }
    h1 { font-size: 2.4rem; text-transform: uppercase; letter-spacing: 6px; color: var(--glow); text-shadow: 0 0 30px var(--glow); margin: 0; }
    .sub { color: #666; font-size: 1rem; margin-top: 8px; }
    .container { display: flex; width: 95%; max-width: 1280px; gap: 25px; background: rgba(255,255,255,0.015); padding: 25px; border: 1px solid #1a1a2e; border-radius: 18px; backdrop-filter: blur(12px); }
    textarea { flex: 1; height: 620px; background: #000; border: 1px solid #2a2a4a; border-radius: 10px; color: #00ff88; padding: 20px; font-size: 14px; line-height: 1.6; outline: none; transition: 0.3s; }
    textarea:focus { border-color: var(--glow); box-shadow: 0 0 25px rgba(0,255,136,0.2); }
    .controls { display: flex; flex-direction: column; gap: 18px; width: 300px; }
    button { padding: 16px; background: transparent; color: var(--glow); border: 1px solid var(--glow); border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; font-size: 1.1rem; }
    button:hover { background: var(--glow); color: #000; box-shadow: 0 0 30px var(--glow); transform: translateY(-2px); }
    .status-bar { margin: 15px 0; font-size: 13px; color: #555; text-align: center; width: 95%; max-width: 1280px; }
    #msg { color: var(--glow); font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">
    <h1>ZhiLua <span style="color:#fff">Obfuscator</span></h1>
    <p class="sub">算法修复版 · 商用级防逆向</p>
  </div>
  <div class="container">
    <textarea id="input" placeholder="-- 输入你的原始 Lua 代码..."></textarea>
    <div class="controls">
      <button onclick="proEncrypt()">安全加密</button>
      <button onclick="copy()">复制结果</button>
      <button onclick="window.location.reload()">重置</button>
    </div>
  </div>
  <div class="status-bar">系统状态: <span id="msg">就绪</span></div>

  <script>
    function randName(len=8) {
      const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
      let name = chars[Math.floor(Math.random() * chars.length)];
      for (let i = 0; i < len; i++) name += chars[Math.floor(Math.random() * chars.length)];
      return name;
    }

    function proEncrypt() {
      const code = document.getElementById('input').value;
      if (!code) return alert("请输入代码");

      // 算法核心：XOR 混淆
      let byteArray = [];
      const key = Math.floor(Math.random() * 255);
      
      for (let i = 0; i < code.length; i++) {
        let charCode = code.charCodeAt(i);
        // 加密：XOR + 偏移
        byteArray.push((charCode ^ key) + 10);
        // 插入垃圾字节：在每个真字节后插入一个随机字节
        byteArray.push(Math.floor(Math.random() * 255));
      }

      // 生成随机变量名
      const vData = randName();
      const vKey = randName();
      const vResult = randName();
      const vLoader = randName();
      const vFunc = randName();

      // 构建 Lua 解密脚本
      let obfuscated = `-- ZhiLua Obfuscator v2.0
local ${vData} = {${byteArray.join(',')}}
local ${vKey} = ${key}
local ${vResult} = ""

-- 核心解码逻辑 (修复版：每两步取一个真数据)
for i = 1, #${vData}, 2 do
    ${vResult} = ${vResult} .. string.char((${vData}[i] - 10) ~ ${vKey})
end

-- 插入反调试陷阱
local function ${vFunc}()
    if debug and debug.getinfo(2) then
        -- 侦测到调试器时采取行动
        error("Unauthorized access")
    end
end
pcall(${vFunc})

-- 执行代码
local ${vLoader} = loadstring or load
${vLoader}(${vResult})()`;

      document.getElementById('input').value = obfuscated;
      document.getElementById('msg').innerText = "加密完成，数据已对齐";
    }

    function copy() {
      document.getElementById('input').select();
      document.execCommand('copy');
      alert("已复制");
    }
  </script>
</body>
</html>
