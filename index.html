<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zhiUI Code Porter - Raw Link</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --accent: #007aff;
            --accent-share: #5856d6;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --border: #222222;
            --success: #34c759;
            --error: #ff3b30;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 850px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header { margin-bottom: 30px; text-align: center; }
        h2 { margin: 0; color: var(--accent); letter-spacing: -0.5px; }
        p { color: var(--text-dim); font-size: 14px; margin-top: 8px; }

        textarea {
            width: 100%;
            height: 350px;
            background: #000;
            color: #d1d1d1;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus { border-color: var(--accent); }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            display: flex;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 12px;
            min-width: 200px;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 0;
            outline: none;
            width: 100%;
        }

        .input-group span { color: var(--text-dim); align-self: center; font-size: 14px; }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-download { background: var(--accent); color: white; }
        .btn-share { background: transparent; border: 1px solid var(--accent-share); color: var(--accent-share); }
        .btn-share:hover { background: var(--accent-share); color: white; }

        #status {
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }

        .success { color: var(--success); }
        .error { color: var(--error); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2>zhiUI Code Porter</h2>
            <p>输入代码并生成直接可引用的 Raw 链接</p>
        </header>

        <textarea id="textContent" placeholder="在此粘贴你的代码内容..."></textarea>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="fileName" placeholder="项目标题" value="zhiUI_Script">
                <span>.txt</span>
            </div>
            
            <button class="btn btn-share" onclick="createPaste()">
                <span></span> 创建 Raw 链接
            </button>

            <button class="btn btn-download" onclick="saveAsTxt()">
                <span></span> 下载文件
            </button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const contentEl = document.getElementById('textContent');
        const nameEl = document.getElementById('fileName');

        function setStatus(msg, type = '') {
            statusEl.innerText = msg;
            statusEl.className = type;
        }

        function saveAsTxt() {
            const content = contentEl.value;
            const name = (nameEl.value || "file") + ".txt";
            if (!content.trim()) return setStatus("内容为空", "error");

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
            setStatus("文件已下载", "success");
        }

        function createPaste() {
            const content = contentEl.value;
            const title = nameEl.value || "Untitled";

            if (!content.trim()) return setStatus("无法上传空内容", "error");

            setStatus("正在生成 Raw 链接...", "");

            fetch('https://pastefy.app/api/v2/paste', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: title,
                    content: content,
                    type: "PASTE"
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    // 关键改动：在 ID 后面加上 /raw
                    const rawUrl = `https://pastefy.app/${data.paste.id}/raw`;
                    setStatus("已生成 Raw 链接并尝试打开", "success");
                    window.open(rawUrl, '_blank');
                    
                    // 自动复制到剪贴板
                    navigator.clipboard.writeText(rawUrl);
                }
            })
            .catch(() => setStatus("链接创建失败", "error"));
        }
    </script>
</body>
</html>
