<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>纸lua 终极加密生成器</title>
  <style>
    body { margin: 0; padding: 0; font-family: system-ui, sans-serif; background: #0f0f17; color: #e0e0ff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    h1 { color: #a0c0ff; margin-bottom: 20px; }
    .main-area { width: 90%; max-width: 960px; display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
    .editor { flex: 1; min-width: 500px; }
    textarea { width: 100%; height: 480px; padding: 20px; background: #141422; border: 1px solid #333355; border-radius: 10px; color: #d0d0ff; font-family: Consolas, monospace; font-size: 15px; resize: vertical; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    .sidebar { width: 240px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
    
    /* 统一按钮样式 */
    button, .link-btn { padding: 16px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.25s; width: 100%; max-width: 240px; text-decoration: none; text-align: center; box-sizing: border-box; }
    
    #generateBtn { background: #ae52ff; color: white; }
    #generateBtn:hover { background: #b96bff; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(174,82,255,0.4); }
    
    /* 复制按钮样式 */
    #copyCodeBtn { background: #3498db; color: white; }
    #copyCodeBtn:hover { background: #5dade2; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(52,152,219,0.4); }
    
    #copyAuthorBtn { background: #ff69b4; color: white; }
    #copyAuthorBtn:hover { background: #ff85c0; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,105,180,0.4); }
    
    .link-btn { background: #2ecc71; color: white; display: block; }
    .link-btn:hover { background: #27ae60; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(46,204,113,0.4); }
    
    #msg { margin-top: 20px; font-size: 16px; color: #a0ffcc; text-align: center; width: 100%; max-width: 960px; min-height: 20px; }
  </style>
</head>
<body>

  <h1>纸lua 终极加密生成器</h1>

  <div class="main-area">
    <div class="editor">
      <textarea id="code" placeholder="-- 粘贴你的 Lua 代码在这里
-- 点击下方按钮生成混淆代码
-- 混淆级别：极高 (反人工分析 + 虚假逻辑)"></textarea>
    </div>

    <div class="sidebar">
      <button id="generateBtn" onclick="generateTxt()">下载混淆 TXT</button>
      <button id="copyCodeBtn" onclick="copyObfuscatedCode()">复制混淆代码</button>
      <button id="copyAuthorBtn" onclick="copyAuthor()">复制作者 B 站</button>
      <a href="https://your-creation-site.com" target="_blank" class="link-btn">创造链接</a>
    </div>
  </div>

  <div id="msg"></div>

  <script>
    let lastGeneratedCode = "";

    // 核心加密逻辑
    function obfuscateCode(code) {
      // 1. 字符偏移
      let charEncoded = "";
      for (let i = 0; i < code.length; i++) {
        charEncoded += String.fromCharCode(code.charCodeAt(i) + 1);
      }
      
      // 2. 多重 Base64
      let b64 = btoa(unescape(encodeURIComponent(charEncoded)));
      b64 = btoa(b64); 

      // 3. 构造极度复杂的 Lua 解密器，完全去除了注释和多余空格/换行
      
      // 虚假检查逻辑：紧凑版，无注释
      const fakeCheck = `local _ci=math.random(1e4,99999);local function sv() for i=1,10 do local _=string.reverse("fakesecurity");if _=="ytirucesekaf" then end end end;sv();`;
      
      // 拼接所有逻辑
      return `local __F=[=[${fakeCheck}]=];` +
             `local j=function(s)local r='' for i=1,#s do r=r..string.char(s:byte(i)-1)end return r end;` +
             `local b='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';` +
             `local d=function(data)data=string.gsub(data,'[^'..b..'=]','');return(data:gsub('.',function(x)if(x=='=')then return'' end;local r,f='',(b:find(x)-1);for i=6,1,-1 do r=r..(f%2^i-f%2^(i-1)>=1 and'1'or'0');end;return r;end):gsub('%d%d%d?%d?%d?%d?%d?%d?',function(x)if(#x~=8)then return''end;local c=0;for i=1,8 do c=c+(x:sub(i,i)=='1' and 2^(8-i)or 0);end;return string.char(c);end));end;` +
             `local __="${b64}";` +
             `local _=j(d(d(__)));` +
             `loadstring(_..__F)();`;
    }

    function getNextIndex() {
      let index = parseInt(localStorage.getItem('zhifeijiyut_index') || '0', 10);
      index += 1;
      localStorage.setItem('zhifeijiyut_index', index);
      return index;
    }

    // 更新消息提示
    function showMsg(text, color) {
        const msg = document.getElementById('msg');
        msg.textContent = text;
        msg.style.color = color;
        setTimeout(() => { msg.textContent = ''; }, 3000);
    }

    // 生成并下载 TXT 文件
    function generateTxt() {
      const originalCode = document.getElementById('code').value.trim();

      if (!originalCode) {
        showMsg('请输入代码再生成哦～', '#ff7777');
        return;
      }

      // 获取加密后的内容
      lastGeneratedCode = obfuscateCode(originalCode);
      
      // TXT 文件内容仅包含代码本身
      const txtContent = lastGeneratedCode;

      const index = getNextIndex();
      let filename = `encrypted_code_${index}.txt`; 

      // 创建 Blob 对象
      const blob = new Blob([txtContent], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      
      // 创建隐藏的下载链接
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      
      // 清理
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showMsg(`文本文件已生成：${filename}  •  已下载`, '#a0ffcc');
    }

    // 复制混淆代码到剪贴板
    function copyObfuscatedCode() {
      const originalCode = document.getElementById('code').value.trim();
      
      if (!originalCode) {
        showMsg('请输入代码再复制哦～', '#ff7777');
        return;
      }

      // 如果还没生成过代码，先生成一次
      if (!lastGeneratedCode) {
        lastGeneratedCode = obfuscateCode(originalCode);
      }

      navigator.clipboard.writeText(lastGeneratedCode).then(() => {
        showMsg('混淆代码已复制到剪贴板！', '#3498db');
      }).catch(err => {
        showMsg('复制失败，请手动复制', '#ff7777');
        console.error('Copy failed:', err);
      });
    }

    function copyAuthor() {
      const link = 'https://b23.tv/4DZnv9H';
      navigator.clipboard.writeText(link).then(() => {
        showMsg('已复制作者 B 站主页：' + link, '#ff69b4');
      });
    }
  </script>

</body>
</html>
