<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>代码下载器 (增强版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 300px; margin-bottom: 10px; border: 2px solid #ddd; border-radius: 8px; padding: 10px; font-family: 'Courier New', monospace; }
        .btn { background: #007AFF; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #0056b3; }
        #status { color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <h3>请输入代码：</h3>
    <textarea id="textContent" placeholder="把你想保存的内容粘贴到这里..."></textarea>

    <div>
        <input type="text" id="fileName" value="my_code" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;"> .txt
        <button class="btn" onclick="saveAsTxt()">保存并下载</button>
    </div>
    <div id="status"></div>

    <script>
        function saveAsTxt() {
            const content = document.getElementById('textContent').value;
            const name = document.getElementById('fileName').value + ".txt";
            const status = document.getElementById('status');

            if (!content.trim()) {
                status.innerText = "❌ 请先输入内容！";
                return;
            }

            try {
                // 创建 Blob
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });

                // 方案 A: 使用 URL.createObjectURL (主流方式)
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = name;

                document.body.appendChild(a);
                a.click();

                // 延迟释放，确保下载触发
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    status.innerText = "✅ 下载请求已发送！";
                }, 100);

            } catch (err) {
                // 方案 B: 备用方案 (Data URL)
                status.innerText = "正在尝试备用下载方式...";
                const link = document.createElement('a');
                link.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(content);
                link.download = name;
                link.click();
            }
        }
    </script>
</body>
</html>
