<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>纸lua 终极加密生成器</title>
  <style>
    body { margin: 0; padding: 0; font-family: system-ui, sans-serif; background: #0f0f17; color: #e0e0ff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    h1 { color: #a0c0ff; margin-bottom: 20px; }
    .main-area { width: 90%; max-width: 960px; display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
    .editor { flex: 1; min-width: 500px; }
    textarea { width: 100%; height: 480px; padding: 20px; background: #141422; border: 1px solid #333355; border-radius: 10px; color: #d0d0ff; font-family: Consolas, monospace; font-size: 15px; resize: vertical; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    .sidebar { width: 240px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
    button, .link-btn { padding: 16px 40px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.25s; width: 100%; max-width: 240px; text-decoration: none; text-align: center; box-sizing: border-box; }
    #generateBtn { background: #ae52ff; color: white; }
    #generateBtn:hover { background: #b96bff; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(174,82,255,0.4); }
    #copyAuthorBtn { background: #ff69b4; color: white; }
    #copyAuthorBtn:hover { background: #ff85c0; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,105,180,0.4); }
    .link-btn { background: #2ecc71; color: white; display: block; }
    .link-btn:hover { background: #27ae60; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(46,204,113,0.4); }
    #msg { margin-top: 20px; font-size: 16px; color: #a0ffcc; text-align: center; width: 100%; max-width: 960px; min-height: 20px; }
  </style>
</head>
<body>

  <h1>纸lua 终极加密生成器</h1>

  <div class="main-area">
    <div class="editor">
      <textarea id="code" placeholder="-- 粘贴你的 Lua 代码在这里
-- 点击终极加密后会自动下载
-- 混淆级别：极高 (反人工分析 + 虚假逻辑)"></textarea>
    </div>

    <div class="sidebar">
      <button id="generateBtn" onclick="generate()">终极加密下载</button>
      <button id="copyAuthorBtn" onclick="copyAuthor()">复制作者 B 站</button>
      <a href="https://your-creation-site.com" target="_blank" class="link-btn">创造链接</a>
    </div>
  </div>

  <div id="msg"></div>

  <script>
    // 生成虚假检查逻辑
    function generateFakeCheck() {
        return `
-- [SYSTEM] 安全检查模块 (虚假逻辑)
local _check_id = math.random(10000, 99999)
local function secure_verify()
    for i=1, 10 do
        local _ = string.reverse("fakesecurity")
        if _ == "ytirucesekaf" then
            -- 虚假日志
            -- print("[SECURE] Checksum valid: " .. _check_id)
        end
    end
end
secure_verify()
`;
    }

    // 核心加密逻辑
    function obfuscateCode(code) {
      // 1. 字符偏移
      let charEncoded = "";
      for (let i = 0; i < code.length; i++) {
        charEncoded += String.fromCharCode(code.charCodeAt(i) + 1);
      }
      
      // 2. 多重 Base64
      let b64 = btoa(unescape(encodeURIComponent(charEncoded)));
      b64 = btoa(b64); 

      // 3. 构造极度复杂的 Lua 解密器 + 假逻辑
      return `-- 纸lua 终极混淆保护\n` +
             `local __F = ${JSON.stringify(generateFakeCheck())}\n` +
             `local j = function(s) local r='' for i=1,#s do r=r..string.char(s:byte(i)-1) end return r end\n` +
             `local b='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'\n` +
             `local d=function(data) data=string.gsub(data,'[^'..b..'=]','') return (data:gsub('.',function(x) if (x=='=') then return '' end local r,f='',(b:find(x)-1) for i=6,1,-1 do r=r..(f%2^i-f%2^(i-1)>0 and '1' or '0') end return r end):gsub('%d%d%d?%d?%d?%d?%d?%d?',function(x) if (#x~=8) then return '' end local c=0 for i=1,8 do c=c+(x:sub(i,i)=='1' and 2^(8-i) or 0) end return string.char(c) end)) end\n` +
             `local __ = "${b64}"\n` +
             `local _ = j(d(d(__)))\n` +
             `loadstring(_..__F)()\n`;
    }

    function getNextIndex() {
      let index = parseInt(localStorage.getItem('zhifeijiyut_index') || '0', 10);
      index += 1;
      localStorage.setItem('zhifeijiyut_index', index);
      return index;
    }

    function generate() {
      const originalCode = document.getElementById('code').value.trim();
      const msg = document.getElementById('msg');

      if (!originalCode) {
        msg.textContent = '请输入代码再生成哦～';
        msg.style.color = '#ff7777';
        return;
      }

      const finalCode = obfuscateCode(originalCode);
      const index = getNextIndex();
      let filename = `ultimate_protected_${index}.lua`;

      const blob = new Blob([finalCode], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      msg.textContent = `终极加密完成：${filename}  •  已下载`;
      msg.style.color = '#a0ffcc';
    }

    function copyAuthor() {
      const link = 'https://b23.tv/4DZnv9H';
      navigator.clipboard.writeText(link).then(() => {
        const msg = document.getElementById('msg');
        msg.textContent = '已复制作者 B 站主页：' + link;
        msg.style.color = '#ff69b4';
        setTimeout(() => { msg.textContent = ''; }, 5000);
      });
    }
  </script>

</body>
</html>
