<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zhiUI Code Porter - Ultimate Edition</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --accent: #007aff;
            --accent-share: #5856d6;
            --accent-fetch: #ff9500;
            --accent-copy: #8e8e93;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --border: #222222;
            --success: #34c759;
            --error: #ff3b30;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        header { margin-bottom: 25px; text-align: center; }
        h2 { margin: 0; color: var(--accent); letter-spacing: -0.5px; }
        p { color: var(--text-dim); font-size: 14px; margin-top: 8px; }

        .fetch-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .fetch-input {
            flex: 2;
            min-width: 250px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            outline: none;
            font-size: 14px;
            transition: border 0.3s;
        }

        .fetch-input:focus { border-color: var(--accent-fetch); }

        textarea {
            width: 100%;
            height: 420px;
            background: #000;
            color: #d1d1d1;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: vertical;
            outline: none;
            transition: border 0.3s;
        }

        textarea:focus { border-color: var(--accent); }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            display: flex;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 12px;
            min-width: 180px;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 0;
            outline: none;
            width: 100%;
        }

        .input-group span { color: var(--text-dim); align-self: center; font-size: 14px; }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn:active { transform: scale(0.96); }
        .btn-fetch { background: var(--accent-fetch); color: white; }
        .btn-copy { background: var(--accent-copy); color: white; }
        .btn-download { background: var(--accent); color: white; }
        .btn-share { background: transparent; border: 1px solid var(--accent-share); color: var(--accent-share); }
        .btn-share:hover { background: var(--accent-share); color: white; }

        #status {
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            min-height: 18px;
            letter-spacing: 0.5px;
        }

        .success { color: var(--success); }
        .error { color: var(--error); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2>zhiUI Code Porter</h2>
            <p>提取、管理并分发您的脚本代码链接</p>
        </header>

        <div class="fetch-box">
            <input type="text" id="urlInput" class="fetch-input" placeholder="支持 Luarmor, GitHub, Pastefy 等链接...">
            <button class="btn btn-fetch" onclick="fetchContent()">提取内容</button>
            <button class="btn btn-copy" id="copyBtn" onclick="copyToClipboard()">复制内容</button>
        </div>

        <textarea id="textContent" placeholder="在此粘贴代码或通过上方链接提取..."></textarea>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="fileName" placeholder="项目标题" value="zhiUI_Script">
                <span>.txt</span>
            </div>

            <button class="btn btn-share" onclick="createPaste()">生成 Raw 链接</button>
            <button class="btn btn-download" onclick="saveAsTxt()">下载文件</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const contentEl = document.getElementById('textContent');
        const nameEl = document.getElementById('fileName');
        const urlInputEl = document.getElementById('urlInput');
        const copyBtn = document.getElementById('copyBtn');

        function setStatus(msg, type = '') {
            statusEl.innerText = msg;
            statusEl.className = type;
        }

        // 核心功能：支持跨域中转的提取函数
        async function fetchContent() {
            let url = urlInputEl.value.trim();
            if (!url) return setStatus("请输入有效的链接", "error");

            setStatus("正在通过代理拉取内容...", "");
            
            // 使用 corsproxy.io 处理跨域问题
            const proxy = "https://corsproxy.io/?"; 
            const targetUrl = proxy + encodeURIComponent(url);

            try {
                const response = await fetch(targetUrl);
                if (!response.ok) throw new Error("HTTP 错误: " + response.status);

                const text = await response.text();
                
                if (!text || text.length < 2) {
                    throw new Error("链接返回的内容为空");
                }

                contentEl.value = text;
                setStatus("内容拉取成功 (已绕过 CORS 限制)", "success");
            } catch (err) {
                console.error(err);
                setStatus("提取失败: " + err.message + "。请确认链接是具体的文件。内容错误: ", "error");
            }
        }

        function copyToClipboard() {
            const content = contentEl.value;
            if (!content.trim()) return setStatus("编辑器内容为空", "error");

            navigator.clipboard.writeText(content).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "已复制！";
                copyBtn.style.background = "var(--success)";
                setStatus("代码已复制到剪贴板", "success");

                setTimeout(() => {
                    copyBtn.innerText = originalText;
                    copyBtn.style.background = "var(--accent-copy)";
                }, 1500);
            }).catch(() => setStatus("复制失败", "error"));
        }

        function saveAsTxt() {
            const content = contentEl.value;
            const name = (nameEl.value || "file") + ".txt";
            if (!content.trim()) return setStatus("内容为空", "error");

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
            setStatus("文件已开始下载", "success");
        }

        function createPaste() {
            const content = contentEl.value;
            const title = nameEl.value || "Untitled";

            if (!content.trim()) return setStatus("内容为空，无法生成链接", "error");

            setStatus("正在上传至 Pastefy...", "");

            fetch('https://pastefy.app/api/v2/paste', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title: title,
                    content: content,
                    type: "PASTE"
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    const rawUrl = `https://pastefy.app/${data.paste.id}/raw`;
                    setStatus("Raw 链接生成成功，已自动复制", "success");
                    window.open(rawUrl, '_blank');
                    navigator.clipboard.writeText(rawUrl);
                }
            })
            .catch(() => setStatus("云端上传失败，请检查网络", "error"));
        }
    </script>
</body>
</html>
