<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZhiLua Simple</title>
  <style>
    :root { --glow: #00ff88; --bg: #05050a; }
    body { margin:0; background:var(--bg); color:#eee; font-family:monospace; padding:20px; }
    textarea { width:100%; height:400px; background:#000; color:#0f0; padding:15px; font-size:15px; }
    .controls { margin:20px 0; display:flex; gap:15px; flex-wrap:wrap; }
    button { padding:12px 24px; font-size:16px; background:transparent; color:var(--glow); border:2px solid var(--glow); cursor:pointer; }
    button:hover { background:var(--glow); color:#000; }
    #msg { color:var(--glow); font-weight:bold; }
  </style>
</head>
<body>
  <h2>ZhiLua Simple - 已修復版</h2>
  <textarea id="input" placeholder="輸入原始 Lua 代碼..."></textarea>
  <div class="controls">
    <button onclick="encrypt()">加密</button>
    <button onclick="downloadTxt()" id="dlBtn" disabled>下載 .txt</button>
    <button onclick="copyCode()">複製</button>
  </div>
  <div>狀態: <span id="msg">就緒</span></div>

  <script>
    let lastCode = "";

    function encrypt() {
      const ta = document.getElementById("input");
      const code = ta.value.trim();
      const msg = document.getElementById("msg");
      const dl = document.getElementById("dlBtn");

      if (!code) {
        msg.textContent = "請輸入代碼";
        msg.style.color = "red";
        return;
      }

      const key = Math.floor(Math.random() * 255) + 1;
      let bytes = [];
      for (let i = 0; i < code.length; i++) {
        bytes.push(code.charCodeAt(i) ^ key);
      }

      const var1 = "x" + Math.random().toString(36).slice(2,10);
      const var2 = "k" + Math.random().toString(36).slice(2,10);
      const var3 = "s" + Math.random().toString(36).slice(2,10);

      // 正確使用模板字串插值（不要亂加 \ 轉義）
      const lua = [
        `-- ZhiLua Simple`,
        `local \( {var1} = { \){bytes.join(",")}}`,
        `local ${var2} = ${key}`,
        `local ${var3} = ""`,
        `for i=1,#${var1} do`,
        `  ${var3} = \( {var3} .. string.char( \){var1}[i] \~ ${var2})`,
        `end`,
        `return (loadstring or load)(${var3})()`
      ].join("\n");

      ta.value = lua;
      lastCode = lua;

      msg.textContent = `完成 (key = ${key})`;
      msg.style.color = "var(--glow)";
      dl.disabled = false;
    }

    function copyCode() {
      const ta = document.getElementById("input");
      navigator.clipboard.writeText(ta.value).then(() => {
        alert("已複製");
      }).catch(() => alert("複製失敗，請手動選取複製"));
    }

    function downloadTxt() {
      if (!lastCode) return alert("先加密");
      const blob = new Blob([lastCode], {type: "text/plain;charset=utf-8"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "obf_" + Date.now() + ".txt";
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
