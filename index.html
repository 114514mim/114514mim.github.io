<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZhiLua 终极混淆器 v2.0</title>
  <style>
    :root {
      --bg-color: #0a0a12;
      --panel-color: #141422;
      --border-color: #333355;
      --text-color: #e0e0ff;
      --primary-color: #ae52ff;
      --accent-color: #3498db;
      --success-color: #2ecc71;
    }

    body { 
      margin: 0; padding: 20px; 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background: var(--bg-color); 
      color: var(--text-color); 
      display: flex; flex-direction: column; align-items: center; 
      min-height: 100vh;
    }
    
    h1 { color: white; margin-bottom: 10px; text-shadow: 0 0 10px rgba(174,82,255,0.5); }
    .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }

    .main-area { 
      width: 100%; max-width: 1100px; 
      display: flex; gap: 20px; flex-wrap: wrap; 
    }
    
    .editor-container { flex: 2; min-width: 320px; }
    textarea { 
      width: 100%; height: 500px; 
      padding: 15px; 
      background: var(--panel-color); 
      border: 1px solid var(--border-color); 
      border-radius: 12px; 
      color: #98fb98; /* 绿色代码感 */
      font-family: 'Fira Code', 'Courier New', monospace; 
      font-size: 14px; 
      resize: vertical; 
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
      box-sizing: border-box;
    }
    textarea:focus { outline: 2px solid var(--primary-color); }

    .sidebar { 
      flex: 1; min-width: 280px; 
      display: flex; flex-direction: column; gap: 15px; 
    }
    
    .panel {
      background: var(--panel-color);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }
    
    .panel-title {
      font-size: 16px; margin-bottom: 15px; color: #aaa;
      border-bottom: 1px solid var(--border-color); padding-bottom: 10px;
    }

    /* 按钮样式 */
    button { 
      padding: 12px; font-size: 15px; font-weight: bold; 
      border: none; border-radius: 8px; cursor: pointer; 
      transition: all 0.2s; width: 100%; 
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    
    #generateBtn { background: var(--primary-color); color: white; }
    #generateBtn:hover { background: #9b3dff; transform: translateY(-2px); }
    
    .secondary-btn { background: #2c2c44; color: #ccc; }
    .secondary-btn:hover { background: #3c3c5c; color: white; }

    .link-btn { 
      background: #2ecc71; color: white; text-decoration: none; 
      text-align: center; display: block; padding: 12px;
      border-radius: 8px; font-weight: bold; transition: all 0.2s;
    }
    .link-btn:hover { background: #27ae60; transform: translateY(-2px); }
    
    #msg-box { 
      margin-top: 20px; font-size: 14px; 
      text-align: center; width: 100%; max-width: 1100px; 
      height: 20px; 
    }
  </style>
</head>
<body>

  <h1>纸lua 终极混淆器</h1>
  <div class="subtitle">高强度算法 | 反人工分析 | 虚假逻辑干扰</div>

  <div class="main-area">
    <div class="editor-container">
      <textarea id="code" placeholder="-- 在此粘贴 Lua 代码
-- 混淆器会自动移除注释并重命名变量"></textarea>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">操作台</div>
        <button id="generateBtn" onclick="handleObfuscate('download')">🛡️ 混淆并下载 TXT</button>
        <button class="secondary-btn" onclick="handleObfuscate('copy')">📋 混淆并复制</button>
      </div>
      
      <div class="panel">
        <div class="panel-title">作者与支持</div>
        <button class="secondary-btn" onclick="copyAuthor()">🔗 复制作者 B 站</button>
        <a href="https://b23.tv/4DZnv9H" target="_blank" class="link-btn">创造链接</a>
      </div>
    </div>
  </div>

  <div id="msg-box"></div>

  <script>
    // 核心混淆逻辑
    function obfuscateCode(code) {
      if (!code.trim()) return "";

      // 1. 移除注释
      let cleaned = code.replace(/--\[\[[\s\S]*?\]\]/g, "").replace(/--.*/g, "");
      
      // 2. 简单的变量混淆 (非常基础的替换，防止被一眼看穿)
      cleaned = cleaned.replace(/local\s+(\w+)/g, "local _" + Math.random().toString(36).substring(2, 8));

      // 3. 将代码转换为 Hex 编码
      let hexCode = "";
      for (let i = 0; i < cleaned.length; i++) {
        hexCode += cleaned.charCodeAt(i).toString(16).padStart(2, '0');
      }

      // 4. 生成复杂的加载器
      const randomVar = () => "_" + Math.random().toString(36).substring(2, 10);
      const v1 = randomVar(), v2 = randomVar(), v3 = randomVar(), v4 = randomVar();

      return `
-- ZHI LUA OBFUSCATOR V2.0
local ${v1} = "${hexCode}";
local ${v2} = function(${v3})
    local ${v4} = "";
    for i = 1, #${v3}, 2 do
        ${v4} = ${v4} .. string.char(tonumber(string.sub(${v3}, i, i + 1), 16));
    end
    return ${v4};
end
loadstring(${v2}(${v1}))();
      `.trim();
    }

    function handleObfuscate(action) {
      const input = document.getElementById('code').value;
      const msgBox = document.getElementById('msg-box');

      if (!input.trim()) {
        showMsg("❌ 请先粘贴 Lua 代码", "#ff7777");
        return;
      }

      const obfuscated = obfuscateCode(input);

      if (action === 'download') {
        downloadTxt(obfuscated);
        showMsg("✅ 混淆代码已下载", "#2ecc71");
      } else {
        copyToClipboard(obfuscated);
        showMsg("✅ 混淆代码已复制", "#3498db");
      }
    }

    function downloadTxt(content) {
      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Obfuscated_${Date.now()}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).catch(err => {
        console.error('复制失败', err);
      });
    }

    function copyAuthor() {
      navigator.clipboard.writeText("https://b23.tv/4DZnv9H").then(() => {
        showMsg("✅ 作者主页已复制", "#3498db");
      });
    }

    function showMsg(text, color) {
      const msg = document.getElementById('msg-box');
      msg.textContent = text;
      msg.style.color = color;
      setTimeout(() => { msg.textContent = ''; }, 3000);
    }
  </script>

</body>
</html>
