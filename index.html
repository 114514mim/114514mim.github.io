<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ZHI_OBSCURE | 终极混淆控制台</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #main { width: 700px; border: 2px solid #00ff00; padding: 30px; box-shadow: 0 0 25px #00ff0044; text-align: center; }
        textarea { width: 100%; height: 250px; background: #050505; color: #00ff00; border: 1px solid #00ff00; padding: 10px; margin-bottom: 20px; outline: none; }
        button { background: #00ff00; color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        .info { font-size: 12px; color: #666; margin-top: 15px; }
    </style>
</head>
<body>

<div id="main">
    <h1 style="letter-spacing: 10px;">ZHI_OBSCURE</h1>
    <textarea id="src" placeholder="-- 粘贴你的代码至此"></textarea>
    <br>
    <button onclick="build()">构建并下载 zhiobscure.txt</button>
    <div class="info">状态: 核心引擎准备就绪 | 文件名已锁定</div>
</div>

<script>
    function genVar(len) {
        const chars = "lI1O0";
        let res = "_";
        for(let i=0; i<len; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
        return res;
    }

    function build() {
        const input = document.getElementById('src').value;
        if(!input) return alert("请输入代码");

        // 随机加密参数
        const key = Math.floor(Math.random() * 150) + 80;
        const shift = Math.floor(Math.random() * 5) + 1;

        // 字节流变异处理
        let bytes = [];
        for(let i=0; i<input.length; i++) {
            let b = input.charCodeAt(i);
            // 复杂的数学变异
            bytes.push(b ^ (key + (i % shift)));
        }

        // 注入 5000 行高强度垃圾指令，让脚本变长
        let massiveJunk = "";
        for(let i=0; i<5000; i++) {
            let v = genVar(12);
            massiveJunk += `local ${v} = ${Math.random()}; if ${v} == -0.123 then ${v} = 1 end;\n`;
        }

        const dataName = genVar(15);
        const vmName = genVar(15);

        const result = `--[[ 
    PHANTOM VIRTUALIZATION KERNEL 
    PROTECTION LEVEL: MAXIMUM
    TARGET: ZHI_OBSCURE
]]
${massiveJunk}
local ${dataName} = {${bytes.join(",")}}
local function ${vmName}()
    local _dec = ""
    for _idx = 1, #${dataName} do
        -- 核心反混淆障眼法
        local _val = ${dataName}[_idx]
        _dec = _dec .. string.char(bit32.bxor(_val, ${key} + (_idx % ${shift})))
        if _idx % 500 == 0 then -- 运行时动态干扰
             local _t = tick();
        end
    end
    local _exec, _err = loadstring(_dec)
    if _exec then task.spawn(_exec) else error("ERR_NODE_CRASH") end
end
${massiveJunk}
${vmName}()
`;

        // 下载执行
        const blob = new Blob([result], {type: 'text/plain'});
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "zhiobscure.txt"; // 指定的文件名
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
