<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZHI LUA PRO FREE</title>
  <style>
    :root { --glow: #00f2ff; --bg: #05050a; --error: #ff4444; }
    body { margin: 0; background: var(--bg); color: #fff; font-family: 'Fira Code', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .header { margin: 25px 0; text-align: center; }
    h1 { font-size: 2.4rem; text-transform: uppercase; letter-spacing: 6px; color: var(--glow); text-shadow: 0 0 30px var(--glow); margin: 0; }
    .sub { color: #666; font-size: 1rem; margin-top: 8px; }

    .container { display: flex; width: 95%; max-width: 1280px; gap: 25px; background: rgba(255,255,255,0.015); padding: 25px; border: 1px solid #1a1a2e; border-radius: 18px; backdrop-filter: blur(12px); }
    textarea { flex: 1; height: 620px; background: #000; border: 1px solid #2a2a4a; border-radius: 10px; color: #00ff88; padding: 20px; font-size: 14px; line-height: 1.6; outline: none; transition: 0.3s; box-shadow: inset 0 2px 10px rgba(0,0,0,0.6); }
    textarea:focus { border-color: var(--glow); box-shadow: 0 0 25px rgba(0,242,255,0.3); }

    .controls { display: flex; flex-direction: column; gap: 18px; width: 300px; }
    button { padding: 16px; background: transparent; color: var(--glow); border: 1px solid var(--glow); border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; font-size: 1.1rem; }
    button:hover { background: var(--glow); color: #000; box-shadow: 0 0 40px var(--glow); transform: translateY(-2px); }
    button:active { transform: scale(0.97); }

    .status-bar { margin: 15px 0; font-size: 13px; color: #555; text-align: center; width: 95%; max-width: 1280px; }
    #msg { color: var(--glow); font-weight: bold; font-size: 1.1rem; }
  </style>
</head>
<body>

  <div class="header">
    <h1>ZhiLua <span style="color:#fff">Obfuscator Pro</span></h1>
    <p class="sub">霓虹矩阵 · 多层假逻辑 · 商用级防逆向保护</p>
  </div>

  <div class="container">
    <textarea id="input" placeholder="-- 输入你的原始 Lua 代码...
-- 加密后将生成大量假逻辑 + 垃圾代码 + 多态表达式，极难逆向"></textarea>
    <div class="controls">
      <button onclick="proEncrypt()">加密</button>
      <button onclick="downloadCode()">下载混淆文件</button>
      <button onclick="copy()">复制结果</button>
      <button onclick="window.location.reload()" style="border-color:#ff4444; color:#ff4444;">重置</button>
    </div>
  </div>

  <div class="status-bar">系统状态: <span id="msg">就绪 - 等待输入</span></div>

  <script>
    let currentObfuscatedCode = "";

    function showMsg(t, color = 'var(--glow)') {
      const msg = document.getElementById('msg');
      msg.innerText = t;
      msg.style.color = color;
    }

    // 修复：randName 函数无需特殊字符，Lua 变量名需要遵循规则
    function randName() {
      const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
      let name = chars[Math.floor(Math.random() * chars.length)];
      for (let i = 0; i < 8; i++) {
        name += chars[Math.floor(Math.random() * chars.length)];
      }
      return name;
    }

    function proEncrypt() {
      const code = document.getElementById('input').value.trim();
      if (!code) return showMsg("错误：输入代码为空！", "#ff5555");

      showMsg("正在注入矩阵 + 假逻辑...");

      // 步骤1: 字符串处理 (保持原有 XOR 逻辑)
      let encrypted = [];
      for (let i = 0; i < code.length; i++) {
        let c = code.charCodeAt(i);
        c = (c ^ 0xA5) + 17;
        if (c > 255) c -= 256;
        encrypted.push(c);
      }

      // 步骤2: 插入垃圾字节
      let matrix = [];
      for (let i = 0; i < encrypted.length; i++) {
        matrix.push(encrypted[i]);
        const junkCount = Math.floor(Math.random() * 2) + 1;
        for (let j = 0; j < junkCount; j++) {
          matrix.push(Math.floor(Math.random() * 200) + 50);
        }
      }

      // 步骤3: 生成多态算术表达式
      const exprTemplates = [
        v => `(${v} + ${Math.floor(Math.random()*50)} - ${Math.floor(Math.random()*50)})`,
        v => `(bit32 and bit32.bxor(${v}, 0) or ${v})`, // 兼容性修复
        v => `(${v} * 1)`
      ];

      let luaArray = matrix.map(v => {
        return exprTemplates[Math.floor(Math.random() * exprTemplates.length)](v);
      }).join(",");

      // 步骤4: 生成随机变量名
      const vData = randName();
      const vRes = randName();
      const vIdx = randName();
      const vKey = randName();
      const vLoad = randName();
      const vDummy = randName();

      // 步骤5: 假逻辑
      const fakeLogic = `
-- Fake anti-debug & bogus branches
if debug and debug.getinfo then 
  -- error("Debugger detected")
end

-- Dead code block
local ${vDummy} = 0
for i=1,10 do ${vDummy} = ${vDummy} + i end
`;

      // 步骤6: 修正最终代码生成逻辑
      // 这里的重点是字符串的拼接必须逻辑清晰，避免 `\` 的误用
      currentObfuscatedCode = `--[[ ZhiLua Pro Obfuscator ]]
${fakeLogic}
local ${vData} = {${luaArray}}
local ${vRes} = ""
local ${vKey} = 0xA5
local _step = 0
for ${vIdx}=1, # ${vData} do
  local n = ${vData}[${vIdx}]
  _step = _step + 1
  -- 模拟抽样算法，跳过部分垃圾数据
  if _step % 3 == 1 then
    n = bit32 and bit32.bxor(n - 17, ${vKey}) or ((n - 17) ~ ${vKey})
    if n < 0 then n = n + 256 end
    ${vRes} = ${vRes} .. string.char(n)
  end
end

local ${vLoad} = loadstring or load
${vLoad}(${vRes})()
-- Protected by ZhiLua Pro`;

      document.getElementById('input').value = currentObfuscatedCode;
      currentObfuscatedCode = document.getElementById('input').value; // 更新供下载使用
      showMsg("加密完成 - 语法已修复");
    }

    function downloadCode() {
      if(!currentObfuscatedCode) return showMsg("请先加密！", "#ff5555");
      const blob = new Blob([currentObfuscatedCode], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ZhiLua_Protected_${Date.now()}.lua`;
      a.click();
      URL.revokeObjectURL(url);
      showMsg("已下载保护版文件");
    }

    function copy() {
      if (!currentObfuscatedCode) return showMsg("无内容可复制", "#ff5555");
      navigator.clipboard.writeText(currentObfuscatedCode).then(() => {
        showMsg("已复制到剪贴板");
      }).catch(() => {
        showMsg("复制失败，请手动选中复制", "#ff5555");
      });
    }
  </script>
</body>
</html>
