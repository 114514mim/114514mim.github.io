<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zhiUI Code Porter - Visual Edition</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --accent: #007aff;
            --accent-share: #5856d6;
            --accent-fetch: #ff9500;
            --accent-copy: #8e8e93;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --border: #222222;
            --success: #34c759;
            --error: #ff3b30;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1400px; /* 扩宽容器以容纳双栏 */
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        header { margin-bottom: 25px; text-align: center; }
        h2 { margin: 0; color: var(--accent); letter-spacing: -0.5px; }
        p { color: var(--text-dim); font-size: 14px; margin-top: 8px; }

        .fetch-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .fetch-input {
            flex: 1;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            outline: none;
            font-size: 14px;
        }
        .fetch-input:focus { border-color: var(--accent-fetch); }

        /* 核心改动：工作区双栏布局 */
        .workspace {
            display: flex;
            gap: 20px;
            height: 550px;
            margin-bottom: 20px;
        }

        .editor-side, .viewer-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .side-title {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        textarea {
            width: 100%;
            flex: 1;
            background: #000;
            color: #d1d1d1;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: var(--accent); }

        /* 内置沙盒浏览器样式 */
        .web-viewer {
            width: 100%;
            flex: 1;
            background: #fff; /* 默认白色背景方便看清目标网页 */
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 12px;
            display: flex;
            align-items: center;
        }
        .input-group input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 0;
            outline: none;
        }
        .input-group span { color: var(--text-dim); font-size: 14px; }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-fetch { background: var(--accent-fetch); color: white; }
        .btn-catch { background: #ff2d55; color: white; } /* 新增：抓取当前页按钮 */
        .btn-copy { background: var(--accent-copy); color: white; }
        .btn-download { background: var(--accent); color: white; }
        .btn-share { background: transparent; border: 1px solid var(--accent-share); color: var(--accent-share); }
        .btn-share:hover { background: var(--accent-share); color: white; }

        #status {
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            min-height: 18px;
        }
        .success { color: var(--success); }
        .error { color: var(--error); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2>zhiUI Code Porter <span style="font-size: 12px; vertical-align: middle; background: #333; padding: 3px 8px; border-radius: 10px; color: var(--accent-fetch);">可视化交互版</span></h2>
            <p>输入网址并在右侧预览，自由导航至目标页面后一键提取</p>
        </header>

        <div class="fetch-box">
            <input type="text" id="urlInput" class="fetch-input" placeholder="输入你想浏览的网站链接 (例如: https://pastefy.app 等)...">
            <button class="btn btn-fetch" onclick="loadVisualProxy()">🌐 打开可视预览</button>
            <button class="btn btn-catch" onclick="extractCurrentFrame()">⚡ 提取当前视图内容</button>
            <button class="btn btn-copy" id="copyBtn" onclick="copyToClipboard()">复制文本</button>
        </div>

        <div class="workspace">
            <div class="editor-side">
                <div class="side-title"><span>📝 提取后的代码编辑器</span></div>
                <textarea id="textContent" placeholder="等待提取，或者在此直接编辑代码..."></textarea>
            </div>
            
            <div class="viewer-side">
                <div class="side-title">
                    <span>👁️ 互动视窗 (可在内部自由点击链接)</span>
                    <span id="currentBrowsingUrl" style="color: var(--accent-fetch); max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">未连接</span>
                </div>
                <div class="web-viewer">
                    <iframe id="sandboxFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="fileName" placeholder="项目标题" value="zhiUI_Script">
                <span>.txt</span>
            </div>
            <button class="btn btn-share" onclick="createPaste()">生成 Raw 链接</button>
            <button class="btn btn-download" onclick="saveAsTxt()">下载文件</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const contentEl = document.getElementById('textContent');
        const nameEl = document.getElementById('fileName');
        const urlInputEl = document.getElementById('urlInput');
        const copyBtn = document.getElementById('copyBtn');
        const iframe = document.getElementById('sandboxFrame');
        const browsingUrlEl = document.getElementById('currentBrowsingUrl');

        let currentActiveUrl = ""; 

        function setStatus(msg, type = '') {
            statusEl.innerText = msg;
            statusEl.className = type;
        }

        // 核心功能：通过反向代理将网页注入到内嵌 iframe
        async function loadVisualProxy(targetUrl = null) {
            let url = targetUrl || urlInputEl.value.trim();
            if (!url) return setStatus("请输入有效的网址", "error");
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url; // 自动补全协议

            setStatus("正在构建可视化安全视窗...", "");
            browsingUrlEl.innerText = "加载中...";
            currentActiveUrl = url;

            const proxy = "https://corsproxy.io/?"; 
            
            try {
                const response = await fetch(proxy + encodeURIComponent(url));
                if (!response.ok) throw new Error("无法读取该网页");
                
                let html = await response.text();

                // 魔法步骤：重写 HTML 中的相对路径和 A 标签，使用户在内部点击时，依然通过我们的系统加载
                // 这样用户就能在 iframe 里面“自由点击切换页面”
                const baseTag = `<base href="${url}">`;
                html = html.replace('<head>', '<head>' + baseTag);

                // 核心劫持：将页面里所有的跳转拦截，改用我们的系统重新加载
                const injectionScript = `
                    <script>
                        document.addEventListener('click', function(e) {
                            const target = e.target.closest('a');
                            if (target && target.href) {
                                e.preventDefault();
                                window.parent.postMessage({type: 'NAVIGATE', url: target.href}, '*');
                            }
                        });
                    <\/script>
                `;
                html += injectionScript;

                // 将处理后的安全 HTML 塞入 iframe
                iframe.srcdoc = html;
                browsingUrlEl.innerText = url;
                setStatus("视窗载入成功！您可以在右侧点击任意按钮切换页面。", "success");
            } catch (err) {
                setStatus("视窗载入失败 (部分严格安全网站不支持预览): " + err.message, "error");
                browsingUrlEl.innerText = "未连接";
            }
        }

        // 监听来自内部视窗的点击跳转请求
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'NAVIGATE') {
                urlInputEl.value = event.data.url;
                loadVisualProxy(event.data.url); // 内部点击时，重新通过代理请求，实现平滑内嵌跳转
            }
        });

        // ⚡ 一键提取当前视图里的所有文本/代码
        async function extractCurrentFrame() {
            if (!currentActiveUrl) return setStatus("请先在右侧打开一个网站", "error");
            
            setStatus("正在提取当前页面的核心数据...", "");
            const proxy = "https://corsproxy.io/?";

            try {
                const response = await fetch(proxy + encodeURIComponent(currentActiveUrl));
                const text = await response.text();

                // 如果返回的是纯文本、代码、或者是JSON，直接放入
                // 如果返回的是一整个网页 HTML，我们尝试剥离出里面的 <code>, <pre> 或者直接放入文本
                if (text.includes('<!DOCTYPE html>') || text.includes('<html')) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(text, 'text/html');
                    
                    // 智能提取策略：优先找代码块，找不到就抓取纯文本
                    const codeBlock = doc.querySelector('pre, code, textarea');
                    if (codeBlock) {
                        contentEl.value = codeBlock.innerText || codeBlock.value;
                        setStatus("智能识别：已成功提取页面中的代码块！", "success");
                    } else {
                        contentEl.value = doc.body.innerText;
                        setStatus("未找到标准代码块，已提取全页纯文本。", "success");
                    }
                } else {
                    contentEl.value = text;
                    setStatus("提取纯文本成功！", "success");
                }
            } catch (err) {
                setStatus("抓取失败: " + err.message, "error");
            }
        }

        // --- 保留的原有基础功能 ---
        function copyToClipboard() {
            const content = contentEl.value;
            if (!content.trim()) return setStatus("编辑器内容为空", "error");
            navigator.clipboard.writeText(content).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "已复制！";
                copyBtn.style.background = "var(--success)";
                setStatus("代码已复制到剪贴板", "success");
                setTimeout(() => { copyBtn.innerText = originalText; copyBtn.style.background = "var(--accent-copy)"; }, 1500);
            }).catch(() => setStatus("复制失败", "error"));
        }

        function saveAsTxt() {
            const content = contentEl.value;
            const name = (nameEl.value || "file") + ".txt";
            if (!content.trim()) return setStatus("内容为空", "error");
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
            setStatus("文件已开始下载", "success");
        }

        function createPaste() {
            const content = contentEl.value;
            const title = nameEl.value || "Untitled";
            if (!content.trim()) return setStatus("内容为空，无法生成链接", "error");
            setStatus("正在上传至 Pastefy...", "");
            fetch('https://pastefy.app/api/v2/paste', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title, content: content, type: "PASTE" })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    const rawUrl = `https://pastefy.app/${data.paste.id}/raw`;
                    setStatus("Raw 链接生成成功，已自动复制", "success");
                    window.open(rawUrl, '_blank');
                    navigator.clipboard.writeText(rawUrl);
                }
            })
            .catch(() => setStatus("云端上传失败，请检查网络", "error"));
        }
    </script>
</body>
</html>
