<!DOCTYPE html>
<html lang="zh">
<head>
  <!-- ... 原有 head 和 style 不變 ... -->
</head>
<body>
  <!-- ... 原有 header 和 container 不變 ... -->

  <div class="container">
    <textarea id="input" placeholder="-- 輸入你的原始 Lua 代碼..."></textarea>
    <div class="controls">
      <button onclick="proEncrypt()">簡單加密</button>
      <button onclick="downloadResult()" id="btnDownload" disabled>下載為 .txt</button>
      <button onclick="copyResult()">複製結果</button>
      <button onclick="window.location.reload()">重置</button>
    </div>
  </div>

  <!-- ... status-bar 不變 ... -->

  <script>
    let lastObfuscatedCode = "";

    function proEncrypt() {
      // ... 原有 proEncrypt 內容完全不變 ...
      // （保持最後的 input.value = obfuscated; 和 lastObfuscatedCode = obfuscated;）
    }

    function copyResult() {
      // ... 原有 copyResult 不變 ...
    }

    function downloadResult() {
      if (!lastObfuscatedCode) {
        alert("請先進行加密");
        return;
      }

      const blob = new Blob([lastObfuscatedCode], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      
      const link = document.createElement('a');
      link.href = url;
      link.download = `obfuscated_${Date.now()}.txt`;   // ← 改成 .txt
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      document.getElementById('msg').innerText = "已下載為 .txt 檔";
    }
  </script>
</body>
</html>
