<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZHI LUA - 霓虹加密终端</title>
  <style>
    :root { --glow: #00f2ff; --bg: #05050a; }
    body { margin: 0; background: var(--bg); color: #fff; font-family: 'Fira Code', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    
    .header { margin: 40px 0; text-align: center; }
    h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: 5px; color: var(--glow); text-shadow: 0 0 20px var(--glow); }

    .container { display: flex; width: 95%; max-width: 1200px; gap: 20px; background: rgba(255,255,255,0.02); padding: 20px; border: 1px solid #1a1a2e; border-radius: 15px; backdrop-filter: blur(10px); }
    
    textarea { flex: 1; height: 550px; background: #000; border: 1px solid #333; border-radius: 8px; color: #00ff41; padding: 15px; font-size: 13px; line-height: 1.5; outline: none; transition: 0.3s; }
    textarea:focus { border-color: var(--glow); box-shadow: 0 0 15px rgba(0,242,255,0.2); }

    .controls { display: flex; flex-direction: column; gap: 15px; width: 260px; }
    
    button { padding: 15px; background: transparent; color: var(--glow); border: 1px solid var(--glow); border-radius: 5px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.3s; position: relative; overflow: hidden; }
    button:hover { background: var(--glow); color: #000; box-shadow: 0 0 30px var(--glow); }
    button:active { transform: scale(0.95); }

    .status-bar { margin-top: 20px; font-size: 12px; color: #555; }
    #msg { color: var(--glow); font-weight: bold; }
  </style>
</head>
<body>

  <div class="header">
    <h1>ZhiLua <span style="color:#fff">Obfuscator</span></h1>
    <p style="color:#444">高端 Lua 代码矩阵混淆系统</p>
  </div>

  <div class="container">
    <textarea id="input" placeholder="-- 输入原始代码..."></textarea>
    <div class="controls">
      <button onclick="proEncrypt()">🚀 高级矩阵加密</button>
      <button onclick="copy()">📋 复制混淆代码</button>
      <button onclick="window.location.reload()" style="border-color:#ff4444; color:#ff4444;">♻️ 重置终端</button>
      <div style="margin-top:auto; padding:15px; border:1px dashed #333; font-size:11px; color:#666;">
        特性：<br>
        - 插入伪随机干扰字节<br>
        - 算术逻辑隐藏数值<br>
        - 动态解密函数名
      </div>
    </div>
  </div>

  <div class="status-bar">系统状态: <span id="msg">就绪</span></div>

  <script>
    function proEncrypt() {
      const code = document.getElementById('input').value.trim();
      if(!code) return showMsg("错误: 未检测到有效载荷");

      // 1. 混淆数值并插入垃圾数据
      let mixedData = [];
      for (let i = 0; i < code.length; i++) {
        // 真实数据
        mixedData.push(code.charCodeAt(i) + 7); // 偏移加密
        // 插入 1-2 个垃圾数据
        let trashCount = Math.floor(Math.random() * 2) + 1;
        for(let j=0; j<trashCount; j++) {
            mixedData.push(Math.floor(Math.random() * 255)); 
        }
      }

      // 2. 将数组转为 Lua 定义格式 (随机选择加减法混淆)
      let luaArray = mixedData.map(v => {
          let mode = Math.random();
          if(mode > 0.5) {
              let off = Math.floor(Math.random() * 50) + 1;
              return `(${v + off} - ${off})`;
          } else {
              let off = Math.floor(Math.random() * 20) + 2;
              return `(${v - off} + ${off})`;
          }
      }).join(",");

      // 3. 生成随机变量名
      const rand = () => "_" + Math.random().toString(36).substring(2, 8);
      const [vData, vFunc, vRes, vIdx, vVal, vLoad] = [rand(), rand(), rand(), rand(), rand(), rand()];

      // 4. 构造复杂的自还原逻辑
      const output = `--[[ ZHI LUA PROTECT V2.0 ]]
local ${vData} = {${luaArray}}
local ${vRes} = ""
for ${vIdx} = 1, #${vData} do
    local ${vVal} = ${vData}[${vIdx}]
    -- 这里的干扰逻辑：每隔 2-3 个字节取一个真实值
    if ${vIdx} % 2 == 1 then
        ${vRes} = ${vRes} .. string.char(${vVal} - 7)
    end
end
local ${vLoad} = getfenv()[string.reverse("gnirtsdaol")]
${vLoad}(${vRes})()`;

      document.getElementById('input').value = output;
      showMsg("加密完成: 载荷已注入矩阵");
    }

    function showMsg(t) {
      document.getElementById('msg').innerText = t;
    }

    function copy() {
      document.getElementById('input').select();
      document.execCommand('copy');
      showMsg("已复制到剪贴板");
    }
  </script>
</body>
</html>
