<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZHI_OBSCURE V10</title>
    <style>
        body { background: #0a0a0a; color: #ff3e3e; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #console { width: 600px; background: #000; border: 1px solid #ff3e3e; padding: 20px; box-shadow: 0 0 20px #ff3e3e55; }
        textarea { width: 100%; height: 150px; background: #111; color: #fff; border: 1px solid #333; margin: 10px 0; padding: 5px; }
        button { width: 100%; padding: 15px; background: #ff3e3e; color: #000; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #fff; }
    </style>
</head>
<body>

<div id="console">
    <div style="text-align:center; font-size:20px; margin-bottom:10px;">[ ZHI_OBSCURE KERNEL ]</div>
    <textarea id="inputCode" placeholder="在此粘贴源码..."></textarea>
    <button onclick="build()">构建 zhiobscure.txt</button>
</div>

<script>
function build() {
    const src = document.getElementById('inputCode').value;
    if(!src) return;

    // 核心混淆逻辑：不再堆砌行数，而是把逻辑打碎
    const key = Math.floor(Math.random() * 255);
    const data = src.split('').map((c, i) => c.charCodeAt(0) ^ (key + (i % 8))).join(',');

    const output = `--[[ ZHI_OBSCURE_V10 ]]
local _0x1 = {${data}}
local _0x2 = tonumber
local _0x3 = string.char
local _0x4 = bit32 or {bxor = function(a,b) 
    local r, p = 0, 1
    while a>0 or b>0 do
        local aa, bb = a%2, b%2
        if aa ~= bb then r = r + p end
        a, b, p = math.floor(a/2), math.floor(b/2), p*2
    end
    return r
end}

local function _0x5(_0x6)
    local _0x7 = ""
    for _0x8 = 1, #_0x6 do
        _0x7 = _0x7 .. _0x3(_0x4.bxor(_0x6[_0x8], ${key} + ((_0x8 - 1) % 8)))
    end
    return _0x7
end

-- 伪装成系统报错信息的执行层
local _0x9, _0x10 = pcall(function()
    local _0x11 = loadstring or load
    return _0x11(_0x5(_0x1))
end)

if _0x9 and _0x10 then
    task.spawn(_0x10)
else
    warn("Critical System Error: [0x" .. string.format("%X", ${key}) .. "]")
end
`;

    const blob = new Blob([output], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "zhiobscure.txt";
    a.click();
}
</script>
</body>
</html>
