<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物网站</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1>购物网站</h1>

    <div id="authBox">

        <div class="card">
            <h2>注册</h2>

            <input type="text" id="regUser" placeholder="用户名">
            <input type="password" id="regPass" placeholder="密码">

            <button onclick="register()">注册账号</button>
        </div>

        <div class="card">
            <h2>登录</h2>

            <input type="text" id="loginUser" placeholder="用户名">
            <input type="password" id="loginPass" placeholder="密码">

            <button onclick="login()">登录</button>
        </div>

    </div>

    <div id="shop" style="display:none;">
        <h2>欢迎回来</h2>

        <p id="welcome"></p>

        <div class="products">

            <div class="product">
                <h3>手机</h3>
                <p>RM1999</p>
                <button>购买</button>
            </div>

            <div class="product">
                <h3>耳机</h3>
                <p>RM199</p>
                <button>购买</button>
            </div>

            <div class="product">
                <h3>电脑</h3>
                <p>RM3999</p>
                <button>购买</button>
            </div>

        </div>

        <button class="logout" onclick="logout()">
            退出登录
        </button>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
