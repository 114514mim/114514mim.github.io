<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zhiUI Code Porter - Ultimate V3</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #111111;
            --accent: #007aff;
            --accent-share: #5856d6;
            --accent-fetch: #ff9500;
            --accent-copy: #8e8e93;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --border: #222222;
            --success: #34c759;
            --error: #ff3b30;
            --premium: #af52de;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1350px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        header { margin-bottom: 25px; text-align: center; }
        h2 { margin: 0; color: var(--accent); letter-spacing: -0.5px; }
        p { color: var(--text-dim); font-size: 14px; margin-top: 8px; }

        .fetch-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .fetch-input {
            flex: 1;
            min-width: 300px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            outline: none;
            font-size: 14px;
        }
        .fetch-input:focus { border-color: var(--accent-fetch); }

        .workspace {
            display: flex;
            gap: 20px;
            height: 580px;
            margin-bottom: 20px;
        }

        .editor-side, .viewer-side {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .side-title {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            width: 100%;
            flex: 1;
            background: #000;
            color: #d1d1d1;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: var(--accent); }

        .web-viewer {
            width: 100%;
            flex: 1;
            background: #1e1e1e;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 12px;
            display: flex;
            align-items: center;
        }
        .input-group input {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 0;
            outline: none;
        }
        .input-group span { color: var(--text-dim); font-size: 14px; }

        .btn {
            padding: 12px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.96); }
        .btn-fetch { background: var(--accent-fetch); color: white; }
        .btn-catch { background: #ff2d55; color: white; }
        .btn-bypass { background: var(--premium); color: white; } /* 兜底按钮 */
        .btn-copy { background: var(--accent-copy); color: white; }
        .btn-download { background: var(--accent); color: white; }
        .btn-share { background: transparent; border: 1px solid var(--accent-share); color: var(--accent-share); }
        .btn-share:hover { background: var(--accent-share); color: white; }

        #status {
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            min-height: 18px;
        }
        .success { color: var(--success); }
        .error { color: var(--error); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2>zhiUI Code Porter <span style="font-size: 12px; vertical-align: middle; background: #222; padding: 4px 10px; border-radius: 10px; color: var(--premium);">V3 强力破防版</span></h2>
            <p>融合自动化代理抓取与剪贴板智能多轨清洗，彻底解决拒绝访问与空白问题</p>
        </header>

        <div class="fetch-box">
            <input type="text" id="urlInput" class="fetch-input" placeholder="粘贴想要导航提取的链接（如：GitHub、Pastebin、或者各类脚本站）...">
            <button class="btn btn-fetch" onclick="loadVisualProxy()">🌐 打开可视预览</button>
            <button class="btn btn-catch" onclick="extractCurrentFrame()">⚡ 自动提取当前页</button>
            <button class="btn btn-bypass" onclick="bypassBakeClipboard()">📥 智能解析右侧剪贴板</button>
            <button class="btn btn-copy" id="copyBtn" onclick="copyToClipboard()">复制结果</button>
        </div>

        <div class="workspace">
            <div class="editor-side">
                <div class="side-title"><span>📝 最终提取的代码结果</span></div>
                <textarea id="textContent" placeholder="系统会自动在这里清洗并输出干净的代码脚本..."></textarea>
            </div>
            
            <div class="viewer-side">
                <div class="side-title">
                    <span>👁️ 内置互动视窗</span>
                    <span id="currentBrowsingUrl" style="color: var(--accent-fetch); max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">未连接</span>
                </div>
                <div class="web-viewer">
                    <iframe id="sandboxFrame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="fileName" placeholder="项目标题" value="zhiUI_Script">
                <span>.txt</span>
            </div>
            <button class="btn btn-share" onclick="createPaste()">生成 Raw 链接</button>
            <button class="btn btn-download" onclick="saveAsTxt()">下载文件</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const contentEl = document.getElementById('textContent');
        const nameEl = document.getElementById('fileName');
        const urlInputEl = document.getElementById('urlInput');
        const copyBtn = document.getElementById('copyBtn');
        const iframe = document.getElementById('sandboxFrame');
        const browsingUrlEl = document.getElementById('currentBrowsingUrl');

        let currentActiveUrl = ""; 

        function setStatus(msg, type = '') {
            statusEl.innerText = msg;
            statusEl.className = type;
        }

        // 1. 可视化加载：双重备用代理模式
        async function loadVisualProxy(targetUrl = null) {
            let url = targetUrl || urlInputEl.value.trim();
            if (!url) return setStatus("请输入有效的网址", "error");
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            setStatus("正在穿透防盗链并构建视窗...", "");
            browsingUrlEl.innerText = "正在穿透...";
            currentActiveUrl = url;

            // 采用业界最稳的公共多转义代理
            const proxy = "https://corsproxy.io/?"; 
            
            try {
                const response = await fetch(proxy + encodeURIComponent(url));
                if (!response.ok) throw new Error("代理节点响应失败");
                
                let html = await response.text();

                if(html.length < 10) {
                    throw new Error("截获数据过小，可能触发了网站防火墙拦截。");
                }

                // 路径重定向修复
                const baseTag = `<base href="${url}">`;
                html = html.replace('<head>', '<head>' + baseTag);

                // 劫持所有的 a 标签点击事件
                const injectionScript = `
                    <script>
                        document.addEventListener('click', function(e) {
                            const target = e.target.closest('a');
                            if (target && target.href && !target.href.startsWith('javascript:')) {
                                e.preventDefault();
                                window.parent.postMessage({type: 'NAVIGATE', url: target.href}, '*');
                            }
                        });
                    <\/script>
                `;
                html += injectionScript;

                iframe.srcdoc = html;
                browsingUrlEl.innerText = url;
                setStatus("视窗载入成功！您可以在右侧无限制点击切换页面。", "success");
            } catch (err) {
                // 终极策略：如果代理被拦截，直接降级采用直连 iframe
                console.warn("代理被拦截，降级为原生沙盒流:", err.message);
                iframe.removeAttribute('srcdoc');
                iframe.src = url;
                browsingUrlEl.innerText = url;
                setStatus("已启动原生防跨域沙盒流，如遇到空白请使用【智能解析右侧剪贴板】手动破防！", "accent");
            }
        }

        // 监听内部点击切换
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'NAVIGATE') {
                urlInputEl.value = event.data.url;
                loadVisualProxy(event.data.url);
            }
        });

        // 2. 自动化清洗提取核心
        async function extractCurrentFrame() {
            if (!currentActiveUrl) return setStatus("请先在右侧打开一个网站", "error");
            
            setStatus("正在全流解析当前网页的代码和文本...", "");
            const proxy = "https://corsproxy.io/?";

            try {
                const response = await fetch(proxy + encodeURIComponent(currentActiveUrl));
                const text = await response.text();

                cleanAndDisplayCode(text);
            } catch (err) {
                setStatus("自动抓取受阻: " + err.message + "。请使用【智能解析右侧剪贴板】完成最终抓取！", "error");
            }
        }

        // 3. 🛡️ 终极破防：右侧视窗手动全选复制，左侧智能提取
        async function bypassBakeClipboard() {
            try {
                const clipboardText = await navigator.clipboard.readText();
                if(!clipboardText.trim()) {
                    return setStatus("您的系统剪贴板内没有复制任何内容！请先在右侧全选并复制您想要的代码。", "error");
                }
                
                setStatus("正在过滤剪贴板中的网页垃圾信息并清洗代码...", "");
                cleanAndDisplayCode(clipboardText);
            } catch (err) {
                setStatus("无法读取剪贴板，请允许本网页的剪贴板访问权限！", "error");
            }
        }

        // 核心代码清洗器：防止抓下来的是一堆 HTML 网页标签
        function cleanAndDisplayCode(rawText) {
            if (rawText.includes('<!DOCTYPE html>') || rawText.includes('<html')) {
                const parser = new DOMParser();
                const doc = parser.parseFromString(rawText, 'text/html');
                
                // 1. 尝试找各种代码存放处
                const codeBlock = doc.querySelector('pre, code, textarea, [class*="code"], [class*="content"]');
                if (codeBlock) {
                    contentEl.value = codeBlock.innerText || codeBlock.value;
                    setStatus("🔥 智能破防成功：已精准提取出目标代码块！", "success");
                } else {
                    // 2. 实在没有就刮骨疗毒：抽干所有标签留下纯文本
                    contentEl.value = doc.body.innerText.replace(/\n\s*\n/g, '\n');
                    setStatus("未发现独立代码块，已提取全网页的精简文本。", "success");
                }
            } else {
                // 属于纯文本、Raw代码或者已经复制好的代码
                contentEl.value = rawText;
                setStatus("🚀 文本提取/清洗成功！", "success");
            }
        }

        // --- 基础公共功能 ---
        function copyToClipboard() {
            const content = contentEl.value;
            if (!content.trim()) return setStatus("编辑器内容为空", "error");
            navigator.clipboard.writeText(content).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "已复制！";
                copyBtn.style.background = "var(--success)";
                setStatus("代码已成功同步至本地剪贴板", "success");
                setTimeout(() => { copyBtn.innerText = originalText; copyBtn.style.background = "var(--accent-copy)"; }, 1500);
            }).catch(() => setStatus("复制失败", "error"));
        }

        function saveAsTxt() {
            const content = contentEl.value;
            const name = (nameEl.value || "file") + ".txt";
            if (!content.trim()) return setStatus("内容为空", "error");
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
            setStatus("文件下载就绪", "success");
        }

        function createPaste() {
            const content = contentEl.value;
            const title = nameEl.value || "Untitled";
            if (!content.trim()) return setStatus("内容为空，无法生成链接", "error");
            setStatus("正在同步上传至云端...", "");
            fetch('https://pastefy.app/api/v2/paste', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title, content: content, type: "PASTE" })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    const rawUrl = `https://pastefy.app/${data.paste.id}/raw`;
                    setStatus("Raw 云端链接已生成，并自动复制！", "success");
                    window.open(rawUrl, '_blank');
                    navigator.clipboard.writeText(rawUrl);
                }
            })
            .catch(() => setStatus("云端上传遇到阻碍", "error"));
        }
    </script>
</body>
</html>
